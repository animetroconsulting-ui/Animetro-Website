<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/assets/brand/uploads/05_Animetro_Social_Icon.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/brand/uploads/05_Animetro_Social_Icon.png">
    <title>聯絡我們 | 艾美加教育顾问</title>
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body class="zh-contact">
    <header class="site-header">
      <nav class="nav" aria-label="主選單">
        <a class="brand" href="/zh/" aria-label="艾美加教育顾问 home"><img class="brand-logo" src="/assets/brand/uploads/04_Animetro_Horizontal_Website_Logo.png" alt="艾美加教育顾问"></a>
        <div class="nav-links">
          <a href="/zh/">首頁</a>
          <a href="/zh/services/">服務</a>
          <a href="/zh/about/">關於我們</a>
          <a href="/zh/events/">活动</a>
          <a href="/zh/resources/">资源</a>
          <a class="active" href="/zh/contact/">聯絡我們</a>
          <a class="lang-link" href="/en/contact/">English</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="page-hero">
        <p class="eyebrow">聯絡我們</p>
        <h1>開始你的個性化教育規劃</h1>
        <p class="lead">聯絡艾美加教育顾问，討論學生目標、申請時間線與下一步規劃。</p>
      </section>

      <section class="section">
        <div class="contact-panel">
          <h2>私人諮詢</h2>
          <p class="lead">請留下基本資訊與學生需求，我們會透過電子郵件與你聯絡。</p>
          <form class="contact-form" data-contact-form data-language="zh" accept-charset="UTF-8">
            <label>
              家長姓名
              <input name="name" type="text" autocomplete="name" required>
            </label>
            <label>
              電子郵件
              <input name="email" type="email" autocomplete="email" required>
            </label>
            <label>
              學生年級或申請階段
              <input name="grade" type="text">
            </label>
            <label>
              諮詢需求
              <textarea name="message" rows="5" required></textarea>
            </label>
            <button class="button" type="submit">發送電子郵件</button>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <span class="footer-brand"><img class="footer-logo" src="/assets/brand/uploads/02_Animetro_Logo_Transparent.png" alt="Animetro Consulting"><span>Animetro Consulting<small>Growth Beyond Admission</small></span></span>
        <div class="footer-contact" aria-label="Contact information">
          <a href="tel:+19059557068">905-955-7068</a>
          <a href="mailto:consulting@animetro.ca">consulting@animetro.ca</a>
          <a href="https://www.animetro.ca/">www.animetro.ca</a>
        </div>
        <div class="footer-actions">
          <a class="footer-cta" href="/zh/contact/">開始諮詢<small>免費私人諮詢</small></a>
          <div class="footer-qr-list" aria-label="通訊二維碼">
            <figure class="footer-qr"><img src="/assets/images/contact/whatsapp-qr.jpeg" alt="WhatsApp 二維碼"><figcaption>WhatsApp</figcaption></figure>
            <figure class="footer-qr"><img src="/assets/images/contact/wechat-qr.jpeg" alt="WeChat 二維碼"><figcaption>WeChat</figcaption></figure>
          </div>
        </div>
      </div>
    </footer>
    <script src="/assets/contact.js"></script>
  </body>
</html>
